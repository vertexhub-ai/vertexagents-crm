<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CRM{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; font-size: 14px; color: #111; background: #f8f9fa; }
    a { color: #2563eb; text-decoration: none; }
    a:hover { text-decoration: underline; }
    nav { background: #1e3a5f; color: #fff; padding: 0 1.5rem; display: flex; align-items: center; height: 48px; gap: 1.5rem; }
    nav a { color: #cbd5e1; font-size: 13px; }
    nav a:hover, nav a.active { color: #fff; text-decoration: none; }
    nav .brand { font-weight: 700; font-size: 15px; color: #fff; margin-right: auto; }
    .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1rem; }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
    h1 { font-size: 1.4rem; font-weight: 600; }
    h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: .75rem; }
    .btn { display: inline-flex; align-items: center; padding: .35rem .85rem; border-radius: 5px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; text-decoration: none; }
    .btn-primary { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn-primary:hover { background: #1d4ed8; text-decoration: none; }
    .btn-danger { background: #dc2626; color: #fff; border-color: #dc2626; }
    .btn-danger:hover { background: #b91c1c; text-decoration: none; }
    .btn-secondary { background: #fff; color: #374151; border-color: #d1d5db; }
    .btn-secondary:hover { background: #f3f4f6; text-decoration: none; }
    .btn-sm { padding: .2rem .55rem; font-size: 12px; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.07); }
    th { background: #f1f5f9; text-align: left; padding: .6rem .85rem; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: #64748b; border-bottom: 1px solid #e2e8f0; }
    td { padding: .65rem .85rem; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f8fafc; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: .3rem; }
    .form-input, input[type=text], input[type=email], input[type=url], select { width: 100%; padding: .45rem .65rem; border: 1px solid #d1d5db; border-radius: 5px; font-size: 13px; background: #fff; }
    .form-input:focus, input[type=text]:focus, input[type=email]:focus, input[type=url]:focus, select:focus { outline: 2px solid #2563eb; outline-offset: 0; border-color: #2563eb; }
    .form-card { background: #fff; border-radius: 8px; padding: 1.5rem; box-shadow: 0 1px 3px rgba(0,0,0,.07); max-width: 560px; }
    .errorlist { list-style: none; color: #dc2626; font-size: 12px; margin-top: .25rem; }
    .filters { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 1rem; align-items: flex-end; }
    .filters input, .filters select { width: auto; min-width: 160px; }
    .badge { display: inline-block; padding: .15rem .5rem; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-blue { background: #dbeafe; color: #1d4ed8; }
    .pagination { display: flex; gap: .4rem; margin-top: 1rem; align-items: center; font-size: 13px; }
    .pagination a, .pagination span { padding: .25rem .6rem; border-radius: 4px; border: 1px solid #e2e8f0; background: #fff; color: #374151; }
    .pagination a:hover { background: #f1f5f9; text-decoration: none; }
    .pagination .current { background: #2563eb; color: #fff; border-color: #2563eb; }
    .detail-grid { display: grid; grid-template-columns: 160px 1fr; gap: .5rem 1rem; margin-bottom: 1rem; }
    .detail-label { font-size: 12px; font-weight: 600; color: #64748b; padding-top: .1rem; }
    .detail-value { font-size: 13px; }
    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal-box { background: #fff; border-radius: 8px; padding: 1.5rem; max-width: 420px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,.15); }
    .autocomplete-wrapper { position: relative; }
    .autocomplete-results { position: absolute; z-index: 50; left: 0; right: 0; top: 100%; background: #fff; border: 1px solid #d1d5db; border-top: none; border-radius: 0 0 5px 5px; max-height: 220px; overflow-y: auto; }
    .autocomplete-option { padding: .5rem .75rem; cursor: pointer; font-size: 13px; }
    .autocomplete-option:hover { background: #eff6ff; }
    .messages { margin-bottom: 1rem; }
    .alert { padding: .6rem 1rem; border-radius: 5px; font-size: 13px; margin-bottom: .4rem; }
    .alert-success { background: #dcfce7; color: #166534; }
    .alert-error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
<nav>
  <span class="brand">CRM</span>
  <a href="{% url 'contacts:list' %}">Contacts</a>
  <a href="{% url 'accounts:list' %}">Accounts</a>
  {% if user.is_authenticated %}
    <a href="{% url 'logout' %}">Logout ({{ user.username }})</a>
  {% endif %}
</nav>
<div class="container">
  {% if messages %}
  <div class="messages">
    {% for msg in messages %}
    <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
    {% endfor %}
  </div>
  {% endif %}
  {% block content %}{% endblock %}
</div>
<!-- HTMX modal target -->
<div id="modal-container"></div>
</body>
</html>
