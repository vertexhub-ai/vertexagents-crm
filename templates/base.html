<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CRM{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <script>
    // Forward CSRF token on all HTMX requests (needed for DELETE, PUT etc.)
    document.addEventListener('DOMContentLoaded', function () {
      document.body.addEventListener('htmx:configRequest', function (evt) {
        var token = document.cookie.match(/csrftoken=([^;]+)/);
        if (token) {
          evt.detail.headers['X-CSRFToken'] = token[1];
        }
      });
    });
  </script>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'lead_list' %}">CRM</a>
      <div class="navbar-nav flex-row gap-3">
        <a class="nav-link" href="{% url 'lead_list' %}">Leads</a>
        <a class="nav-link" href="{% url 'contact_list' %}">Contacts</a>
        <a class="nav-link" href="{% url 'account_list' %}">Accounts</a>
        <a class="nav-link" href="{% url 'opportunity_list' %}">Opportunities</a>
      </div>
      {% if user.is_authenticated %}
      <div class="ms-auto">
        <span class="text-light me-3">{{ user.username }}</span>
        <a class="btn btn-sm btn-outline-light" href="{% url 'logout' %}">Logout</a>
      </div>
      {% endif %}
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
