<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CRM{% endblock %} — VertexAgents CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <style>
    .form-input { @apply block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm; }
    .form-select { @apply block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm; }
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="h-full">

<nav class="bg-indigo-700 text-white">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">
      <div class="flex items-center gap-6">
        <a href="{% url 'accounts:list' %}" class="text-lg font-bold tracking-tight">VertexCRM</a>
        <a href="{% url 'accounts:list' %}" class="text-sm hover:text-indigo-200">Accounts</a>
      </div>
      <div class="flex items-center gap-4 text-sm">
        {% if user.is_authenticated %}
          <span class="text-indigo-200">{{ user.username }}</span>
          <form method="post" action="{% url 'logout' %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="hover:text-indigo-200">Sign out</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}" class="hover:text-indigo-200">Sign in</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>

<main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
  {% if messages %}
    <div class="mb-6 space-y-2">
      {% for message in messages %}
        <div class="rounded-md px-4 py-3 text-sm
          {% if message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200
          {% elif message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200
          {% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
          {{ message }}
        </div>
      {% endfor %}
    </div>
  {% endif %}

  {% block content %}{% endblock %}
</main>

</body>
</html>
