{% extends "base.html" %}
{% block title %}Set new password — CRM{% endblock %}
{% block content %}
{% if validlink %}
<h1>Set a new password</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit">Set password</button>
</form>
{% else %}
<h1>Invalid reset link</h1>
<p>This link is invalid or has expired. <a href="{% url 'password_reset' %}">Request a new one</a>.</p>
{% endif %}
{% endblock %}
