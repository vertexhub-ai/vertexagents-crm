{% extends "base.html" %}
{% block title %}Leads{% endblock %}
{% block content %}
<h2 class="mb-3">Leads</h2>
<table class="table table-hover">
  <thead><tr><th>Name</th><th>Status</th><th>Email</th><th>Created</th></tr></thead>
  <tbody>
    {% for lead in leads %}
    <tr>
      <td><a href="{% url 'lead_detail' lead.pk %}">{{ lead }}</a></td>
      <td>{{ lead.get_status_display }}</td>
      <td>{{ lead.email|default:"—" }}</td>
      <td>{{ lead.created_at|date:"M j, Y" }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="4" class="text-muted">No leads yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
