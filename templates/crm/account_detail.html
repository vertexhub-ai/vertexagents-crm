{% extends "base.html" %}
{% block title %}Account: {{ obj }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>{{ obj }}</h2>
  <a href="{% url 'account_list' %}" class="btn btn-sm btn-outline-secondary">← Accounts</a>
</div>
<div class="row">
  <div class="col-md-4">
    <div class="card mb-3">
      <div class="card-body">
        <dl class="row mb-0">
          <dt class="col-5">Domain</dt>
          <dd class="col-7">{{ obj.domain|default:"—" }}</dd>
          <dt class="col-5">Created</dt>
          <dd class="col-7">{{ obj.created_at|date:"M j, Y" }}</dd>
        </dl>
      </div>
    </div>
  </div>
</div>
{% include "partials/timeline.html" %}
{% endblock %}
