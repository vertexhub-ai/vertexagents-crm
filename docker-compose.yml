version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    ports:
      - "5432:5432"
  web:
    build: .
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    ports:
      - "8000:8000"
    depends_on:
      - db
